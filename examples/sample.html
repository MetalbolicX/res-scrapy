<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>res-scrapy examples</title>
  </head>
  <body>
    <h1>res-scrapy Examples</h1>

    <section id="links">
      <h2>Simple links</h2>
      <a href="/page1">Link 1</a>
      <a href="/page2">Link 2</a>
    </section>

    <section id="products">
      <h2>Products</h2>
      <article class="product">
        <h3 class="title">Widget A</h3>
        <p class="price">9.99</p>
        <p class="desc">A <strong>bright</strong> widget.</p>
        <a class="buy" href="/buy/widget-a">Buy</a>
        <span class="inStock">true</span>
      </article>

      <article class="product">
        <h3 class="title">Widget B</h3>
        <p class="price">invalid</p>
        <p class="desc">A <em>mysterious</em> widget.</p>
        <a class="buy" href="/buy/widget-b">Buy</a>
        <span class="inStock">false</span>
      </article>
    </section>

    <section id="rich">
      <h2>Rich content</h2>
      <div class="rich">
        <div class="content">
          <p>Paragraph <em>with</em> markup</p>
        </div>
      </div>
    </section>
  </body>
</html>
