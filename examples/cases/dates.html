<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Date Parsing Examples</title>
  </head>
  <body>
    <h1>Date parsing examples</h1>

    <time class="iso" datetime="2024-06-01">June 1, 2024</time>
    <span class="long">June 1, 2024</span>
    <span class="us">06/01/2024</span>
    <span class="euro">01-06-2024</span>
    <span class="relative">2 days ago</span>
  </body>
</html>
