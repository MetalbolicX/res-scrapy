<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Attribute Extraction Examples</title>
  </head>
  <body>
    <h1>Attribute extraction</h1>

    <img
      class="lazy"
      data-lazy="lazy-image.jpg"
      data-src="fallback-image.jpg"
      src="actual-image.jpg"
      alt="A picture"
    />

    <a class="link" href="/foo" title="Foo Link" data-track="abc">Foo</a>

    <a class="all-attrs" href="/bar" title="Bar Link" rel="nofollow">Bar</a>
  </body>
</html>
